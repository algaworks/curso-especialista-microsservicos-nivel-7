include:
  - docker-compose.tools.yml
services:
  algashop-ordering:
    image: algashop/ordering:dev
    restart: no
    ports:
      - 8080:8080
    depends_on:
      algashop-postgres:
        condition: service_healthy
      algashop-redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_TOMCAT_THREADS_MAX: 10 # 200
      SPRING_THREADS_VIRTUAL_ENABLED: true
  algashop-billing:
    image: algashop/billing:dev
    restart: no
    ports:
      - 8082:8082
    depends_on:
      algashop-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-product-catalog:
    image: algashop/product-catalog:dev
    restart: no
    ports:
      - 8083:8083
    depends_on:
      algashop-mongodb-1:
        condition: service_healthy
      algashop-mongodb-2:
        condition: service_started
      algashop-mongodb-3:
        condition: service_started
      algashop-redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-authorization-server:
    image: algashop/authorization-server:dev
    restart: no
    hostname: auth.algashop.local
    ports:
      - 8081:8081
    depends_on:
      algashop-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-service-registry:
    image: algashop/service-registry:dev
    restart: no
    ports:
      - 8761:8761
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-gateway-ecommerce:
    image: algashop/gateway-ecommerce:dev
    restart: no
    ports:
      - 9999:9999
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-gateway-admin:
    image: algashop/gateway-admin:dev
    restart: no
    ports:
      - 9998:9998
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: docker
  algashop-admin-app:
    image: algashop/algashop-admin:dev
    restart: no
    ports:
      - 4200:80
    deploy:
      resources:
        limits:
          memory: 512M
  algashop-ecommerce-app:
    image: algashop/algashop-ecommerce:dev
    restart: no
    ports:
      - 9080:9080
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      SPRING_PROFILES_ACTIVE: docker